<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Vodojem Pávice</title>

<style>
:root{
  --accent:#0078d7;
  --accent-light:#e6f2ff;
}
html,body{height:100%;margin:0}
body{
  font-family:"Segoe UI",Tahoma,Arial,sans-serif;
  background:#f6f8fa;color:#222;
  display:flex;justify-content:center;padding:14px;
}
.container{width:100%;max-width:900px}
header{
  display:flex;align-items:center;gap:12px;
  background:#fff;padding:14px;border-radius:12px;
  box-shadow:0 6px 14px rgba(0,0,0,0.06);
  margin-bottom:14px;
}
.signal-icon{
  width:82px;height:82px;border-radius:50%;
  background:var(--accent);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:34px;
}
header h1{margin:0;font-size:1.4rem}
.signal-strength{font-size:0.92rem;color:#666}
.stat-card{
  background:linear-gradient(135deg,var(--accent-light),#ffffff);
  padding:22px;
  border-radius:16px;
  box-shadow:0 10px 22px rgba(0,0,0,0.08);
  margin-bottom:18px;
  text-align:center;
}
.stat-title{font-weight:700;font-size:0.95rem;color:#555;margin-bottom:10px}
.stat-value{font-size:2.6rem;font-weight:900;color:var(--accent)}
.stat-date{margin-top:6px;font-size:0.95rem;color:#666}
.range-buttons{display:flex;gap:8px;justify-content:center;margin:10px 0 6px}
.range-buttons button{
  border:1px solid var(--accent);
  background:#fff;color:var(--accent);
  padding:6px 14px;border-radius:6px;
  cursor:pointer;font-weight:600;
}
.range-buttons button.active{background:var(--accent);color:#fff}
.charts{
  margin-top:8px;background:#fff;padding:12px;
  border-radius:10px;
  box-shadow:0 6px 14px rgba(0,0,0,0.05);
}
canvas{width:100%!important;height:420px!important}
</style>
</head>

<body>
<div class="container">

<header>
  <div class="signal-icon">📡</div>
  <div style="flex:1">
    <h1>Vodojem Pávice</h1>
    <div class="signal-strength">
      Síla signálu: <span id="signalStrength">–</span>
    </div>
  </div>
</header>

<div class="stat-card">
  <div class="stat-title">Nejvyšší roční Přítok</div>
  <div class="stat-value" id="maxFlowValue">– L/min</div>
  <div class="stat-date" id="maxFlowDate">–</div>
</div>

<div class="range-buttons">
  <!-- ✅ TÝDEN JE AKTIVNÍ -->
  <button class="active" onclick="setRange(7,this)">Týden</button>
  <button onclick="setRange(30,this)">Měsíc</button>
  <button onclick="setRange(365,this)">Rok</button>
</div>

<div class="charts"><canvas id="levelChart"></canvas></div>
<div class="charts"><canvas id="flowChart"></canvas></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>

let rangeDays = 7; // ✅ výchozí týden

const CHANNEL_URL='https://api.thingspeak.com/channels/1214142/feeds.json?results=8000&api_key=SGHZ5KIDVYK3BG1M';

let feedsAll=[];
let levelChart,flowChart;

function setRange(days,btn){
  rangeDays=days;
  document.querySelectorAll('.range-buttons button')
    .forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderCharts();
}

async function fetchData(){
  const r=await fetch(CHANNEL_URL);
  const j=await r.json();
  feedsAll=j.feeds.sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
  renderCharts();
}

function renderCharts(){
  if(!feedsAll.length)return;

  const now=Date.now();
  const filtered=feedsAll.filter(f=>
    now-new Date(f.created_at).getTime()<=rangeDays*24*3600*1000
  );

  const labels=filtered.map(f=>new Date(f.created_at).toLocaleString('cs-CZ'));
  const levelData=filtered.map(f=>parseFloat(f.field2)||0);
  const flowData=filtered.map(f=>parseFloat(f.field3)||0);

  if(!levelChart){
    levelChart=new Chart(document.getElementById('levelChart'),{
      type:'line',
      data:{labels,datasets:[{label:'Hladina (cm)',data:levelData}]},
      options:{maintainAspectRatio:false}
    });
  }else{
    levelChart.data.labels=labels;
    levelChart.data.datasets[0].data=levelData;
    levelChart.update();
  }

  if(!flowChart){
    flowChart=new Chart(document.getElementById('flowChart'),{
      type:'line',
      data:{labels,datasets:[{label:'Přítok (L/min)',data:flowData}]},
      options:{maintainAspectRatio:false}
    });
  }else{
    flowChart.data.labels=labels;
    flowChart.data.datasets[0].data=flowData;
    flowChart.update();
  }
}

fetchData();

</script>
</body>
</html>

</script>
</body>
</html>
