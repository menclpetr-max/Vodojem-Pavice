<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Vodojem Pávice</title>

<style>
:root{
  --accent:#0078d7;
  --accent-light:#e6f2ff;
}
html,body{height:100%;margin:0}
body{
  font-family:"Segoe UI",Tahoma,Arial,sans-serif;
  background:#f6f8fa;color:#222;
  display:flex;justify-content:center;padding:14px;
}
.container{width:100%;max-width:900px}

header{
  display:flex;align-items:center;gap:12px;
  background:#fff;padding:14px;border-radius:12px;
  box-shadow:0 6px 14px rgba(0,0,0,0.06);
  margin-bottom:14px;
}

.signal-icon{
  width:82px;height:82px;border-radius:50%;
  background:var(--accent);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:34px;
}

.stat-card{
  background:linear-gradient(135deg,var(--accent-light),#ffffff);
  padding:22px;
  border-radius:16px;
  box-shadow:0 10px 22px rgba(0,0,0,0.08);
  margin-bottom:18px;
  text-align:center;
}
.stat-title{font-weight:700;font-size:0.95rem;color:#555;margin-bottom:10px}
.stat-value{font-size:2.6rem;font-weight:900;color:var(--accent)}
.stat-date{margin-top:6px;font-size:0.95rem;color:#666}

.svg-wrap{
  background:#fff;padding:12px;border-radius:12px;
  box-shadow:0 6px 18px rgba(0,0,0,0.05);
  margin-bottom:14px;text-align:center;
}

.card{
  background:#fff;padding:12px;border-radius:12px;
  box-shadow:0 6px 14px rgba(0,0,0,0.05);
  margin-bottom:12px;
}
.title-row{
  color:var(--accent);font-weight:700;margin-bottom:8px;
}
.value{font-size:2rem;font-weight:800}
.unit{color:#666}

.progress-bar{
  width:100%;height:12px;background:#eee;
  border-radius:8px;overflow:hidden;margin-top:8px;
}
.progress-fill{
  height:100%;width:0;
  background:linear-gradient(90deg,#00c853,#00aaff);
  transition:width .6s ease;
}

.range-buttons{
  display:flex;gap:8px;justify-content:center;margin:10px 0;
}
.range-buttons button{
  border:1px solid var(--accent);
  background:#fff;color:var(--accent);
  padding:6px 14px;border-radius:6px;
  cursor:pointer;
}
.range-buttons button.active{
  background:var(--accent);color:#fff;
}

.charts{
  margin-top:8px;background:#fff;padding:12px;
  border-radius:10px;
  box-shadow:0 6px 14px rgba(0,0,0,0.05);
}

canvas{width:100%!important;height:420px!important}
</style>
</head>

<body>
<div class="container">

<header>
  <div class="signal-icon">📡</div>
  <div>
    <h1>Vodojem Pávice</h1>
    Síla signálu: <span id="signalStrength">–</span>
    <span id="errorMini" style="font-size:0.75rem;color:#999;margin-left:6px;"></span>
    <br>
    <span id="lastUpdate" style="font-size:0.9rem;color:#666;"></span>
  </div>
</header>

<!-- POČASÍ -->
<div class="stat-card">
  <div class="stat-title">Počasí – Pávice</div>
  <div class="stat-value" id="weatherTemp">– °C</div>
  <div class="stat-date" id="weatherDesc">–</div>
</div>

<!-- NÁDRŽ -->
<div class="svg-wrap">
<svg viewBox="0 0 500 400" width="340" height="260">
<defs>
<clipPath id="tankClip">
<path d="M 30,380 L 470,380 C 460,260 430,140 350,50 L 150,50 C 70,140 40,260 30,380 Z"/>
</clipPath>
</defs>

<path d="M 30,380 L 470,380 C 460,260 430,140 350,50 L 150,50 C 70,140 40,260 30,380 Z"
fill="#f7f9fb" stroke="#cfcfcf"/>

<g clip-path="url(#tankClip)">
<rect id="waterRect" x="0" y="380" width="500" height="0" fill="#2a8be8"/>
</g>

<text id="svgLiters" x="250" y="170" fill="#fff" font-size="30" font-weight="800" text-anchor="middle">— l</text>
<text id="svgPercent" x="250" y="205" fill="#000" font-size="26" font-weight="900" text-anchor="middle">— %</text>
</svg>
</div>

<div class="card">
<div class="title-row">💧 Hladina</div>
<div><span class="value" id="levelValue">–</span> <span class="unit">cm</span></div>
<div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
</div>

<div class="card">
<div class="title-row">🚰 Přítok</div>
<div><span class="value" id="flowValue">–</span> <span class="unit">L/min</span></div>
</div>

<div class="range-buttons">
<button class="active" onclick="setRange(7,this)">Týden</button>
<button onclick="setRange(30,this)">Měsíc</button>
<button onclick="setRange(365,this)">Rok</button>
</div>

<div class="charts"><canvas id="levelChart"></canvas></div>
<div class="charts"><canvas id="flowChart"></canvas></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>

let feedsAll=[];
let levelChart,flowChart;
let rangeDays=7;

function fmt(n){return Number(n).toLocaleString('cs-CZ');}

async function fetchData(){
  const r=await fetch("https://api.thingspeak.com/channels/1214142/feeds.json?results=8000&api_key=SGHZ5KIDVYK3BG1M");
  const j=await r.json();

  feedsAll=j.feeds.sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
  const latest=feedsAll.at(-1);

  const level=parseFloat(latest.field2);
  const flow=parseFloat(latest.field3);

  document.getElementById("levelValue").textContent=level.toFixed(1);
  document.getElementById("flowValue").textContent=flow.toFixed(2);
  document.getElementById("signalStrength").textContent=latest.field1||"–";

  // kontrola aktualizace
  const lastTime=new Date(latest.created_at);
  const diffMin=(Date.now()-lastTime)/60000;

  const lastEl=document.getElementById("lastUpdate");

  if(diffMin>115){
    lastEl.textContent="⚠ Neaktualizováno "+Math.round(diffMin)+" min";
    lastEl.style.color="#c62828";
  }else{
    lastEl.textContent="Aktualizace před "+Math.round(diffMin)+" min";
    lastEl.style.color="#666";
  }

  renderCharts();
}

function setRange(d,b){
  rangeDays=d;
  document.querySelectorAll(".range-buttons button").forEach(x=>x.classList.remove("active"));
  b.classList.add("active");
  renderCharts();
}

function renderCharts(){
  const now=Date.now();

  const filtered=feedsAll.filter(f=>
    now-new Date(f.created_at)<=rangeDays*86400000
  );

  const labels=filtered.map(f=>{
    const d=new Date(f.created_at);
    return rangeDays<=7
      ? d.toLocaleTimeString("cs-CZ",{hour:"2-digit",minute:"2-digit"})
      : d.toLocaleDateString("cs-CZ");
  });

  let errorCount=0;

  const levelData=filtered.map(f=>{
    const v=parseFloat(f.field2);
    if(isNaN(v)||v<=0){
      errorCount++;
      return null;
    }
    return v;
  });

  const flowData=filtered.map(f=>{
    const v=parseFloat(f.field3);
    return (isNaN(v)||v<0)?null:v;
  });

  const mini=document.getElementById("errorMini");
  mini.textContent = errorCount>0 ? "· err "+errorCount : "";

  const options={
    maintainAspectRatio:false,
    responsive:true,
    interaction:{mode:'index',intersect:false},
    scales:{y:{beginAtZero:true}}
  };

  if(!levelChart){
    levelChart=new Chart(document.getElementById("levelChart"),{
      type:"line",
      data:{labels,datasets:[{label:"Hladina",data:levelData,spanGaps:true}]},
      options
    });

    flowChart=new Chart(document.getElementById("flowChart"),{
      type:"line",
      data:{labels,datasets:[{label:"Přítok",data:flowData,spanGaps:true}]},
      options
    });
  }else{
    levelChart.data.labels=labels;
    levelChart.data.datasets[0].data=levelData;
    levelChart.update();

    flowChart.data.labels=labels;
    flowChart.data.datasets[0].data=flowData;
    flowChart.update();
  }
}

fetchData();
setInterval(fetchData,30000);

</script>
</body>
</html>
